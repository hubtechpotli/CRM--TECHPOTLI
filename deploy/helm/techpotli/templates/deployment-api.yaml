apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "techpotli.fullname" . }}-api
  labels:
    app: techpotli-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: techpotli-api
  template:
    metadata:
      labels:
        app: techpotli-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          ports:
            - containerPort: 3001
          env:
            - name: ENABLE_KAFKA
              value: "true"
            - name: KAFKA_BROKERS
              value: "redpanda:9092"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "techpotli.fullname" . }}-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "techpotli.fullname" . }}-api
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
