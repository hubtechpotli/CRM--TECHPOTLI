services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: techpotli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: techpotli
      POSTGRES_PASSWORD: techpotli
      POSTGRES_DB: techpotli_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techpotli -d techpotli_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    container_name: techpotli-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://techpotli:techpotli@postgres:5432/techpotli_os
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: techpotli-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    container_name: techpotli-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  ollama:
    image: ollama/ollama:latest
    container_name: techpotli-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  minio:
    image: minio/minio:latest
    container_name: techpotli-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: techpotli
      MINIO_ROOT_PASSWORD: techpotli123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: techpotli-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9009:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techpotli-api-1
    restart: unless-stopped
    environment: &api_env
      APP_MODE: api
      ENABLE_KAFKA_CONSUMERS: "false"
      DATABASE_URL: postgresql://techpotli:techpotli@pgbouncer:5432/techpotli_os?schema=public
      DATABASE_READ_URL: postgresql://techpotli:techpotli@postgres:5432/techpotli_os?schema=public
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: redpanda:9092
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      OLLAMA_EMBED_MODEL: nomic-embed-text
      ENABLE_CRON_JOBS: "false"
      ENABLE_KAFKA: "true"
      FRONTEND_URL: http://localhost
      BACKEND_URL: http://localhost/api
      PORT: 3001
      JWT_ACCESS_SECRET: change-me-min-32-characters-long-secret
      JWT_REFRESH_SECRET: change-me-min-32-characters-refresh-secret
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ALLOWED_OFFICE_IPS: 0.0.0.0/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
    expose:
      - "3001"

  api-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techpotli-api-2
    restart: unless-stopped
    environment: *api_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
    expose:
      - "3001"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: techpotli-worker
    restart: unless-stopped
    environment:
      <<: *api_env
      ENABLE_CRON_JOBS: "true"
      APP_MODE: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
    container_name: techpotli-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: techpotli-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api
      - api-2

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: techpotli-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.2.0
    container_name: techpotli-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  ollama_data:
  minio_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
