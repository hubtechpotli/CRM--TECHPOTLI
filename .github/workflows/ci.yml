name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: techpotli
          POSTGRES_PASSWORD: techpotli
          POSTGRES_DB: techpotli_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techpotli -d techpotli_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - name: Prisma migrate deploy (dry check)
        env:
          DATABASE_URL: postgresql://techpotli:techpotli@localhost:5432/techpotli_os?schema=public
        run: npx prisma migrate deploy

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build -t techpotli-api:ci ./backend
      - name: Build frontend image
        run: docker build -t techpotli-frontend:ci --build-arg NEXT_PUBLIC_API_URL=http://localhost/api ./frontend
      - name: Build worker image
        run: docker build -f ./backend/Dockerfile.worker -t techpotli-worker:ci ./backend
