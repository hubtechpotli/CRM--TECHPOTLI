# Production stack — CRM essentials only (no Kafka/Ollama/monitoring).
# Usage:
#   1. Copy .env.production.example → .env.production and fill in secrets
#   2. docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#   3. docker compose -f docker-compose.prod.yml exec api npx prisma db seed

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: techpotli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-techpotli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-techpotli_os}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-techpotli} -d ${POSTGRES_DB:-techpotli_os}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: techpotli-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techpotli-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_MODE: api
      ENABLE_KAFKA: "false"
      ENABLE_KAFKA_CONSUMERS: "false"
      ENABLE_CRON_JOBS: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-techpotli}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-techpotli_os}?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL:?Set BACKEND_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-TechPotli}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3001"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: techpotli-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_MODE: worker
      ENABLE_KAFKA: "false"
      ENABLE_KAFKA_CONSUMERS: "false"
      ENABLE_CRON_JOBS: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-techpotli}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-techpotli_os}?schema=public
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-TechPotli}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?Set PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-}
    container_name: techpotli-frontend
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: techpotli-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api

volumes:
  postgres_data:
  redis_data:
